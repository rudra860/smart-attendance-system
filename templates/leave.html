<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leave Application</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="student-bg">

<div class="student-container">

    <div class="student-header">
        <h1>📝 Leave Application</h1>
        <p>{{name}} ({{roll}})</p>
    </div>

    <div class="student-cards">

        <!-- Apply Leave -->
        <div class="student-card gradient-purple">
            <h3>Apply for Leave</h3>

            <form method="post">
                <label>Leave Type</label><br>
                <select required>
                    <option>Medical</option>
                    <option>Personal</option>
                    <option>Academic</option>
                </select><br><br>

                <label>Reason</label>
                <textarea name="reason" placeholder="Enter leave reason" required></textarea>

                <br>
                <button class="neon-btn">Submit Leave</button>
            </form>
        </div>

        <!-- Leave History -->
        <div class="student-card gradient-blue">
            <h3>Leave History</h3>

            <table>
                <tr>
                    <th>Reason</th>
                    <th>Status</th>
                </tr>

                {% for l in history %}
                <tr>
                    <td>{{l[2]}}</td>
                    <td>
                        <span class="badge {{l[3]|lower}}">
                            {{l[3]}}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>

    </div>

    <br>
    <div style="text-align:center;">
        <a href="/student" class="neon-btn">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
